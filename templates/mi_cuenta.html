<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Mi Cuenta — Studio Moda</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div id="fondo">
  <a href="{{ url_for('inicio') }}" class="btn btn-warning position-absolute top-0 start-0 m-3">
    Volver al inicio
  </a>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-avatar">&#128100;</div>
      <h2 class="auth-title">Mi Cuenta</h2>

      <div class="field">
        <label>Nombre</label>
        <p><strong>{{ usuario.nombre }}</strong></p>
      </div>
      <div class="field">
        <label>Correo</label>
        <p><strong>{{ usuario.correo }}</strong></p>
      </div>

      <a href="{{ url_for('editar_cuenta') }}" class="btn-primary" style="display:block; text-align:center; margin-top:16px;">
         Editar mis datos
      </a>

      <form method="POST" action="{{ url_for('eliminar_cuenta') }}" 
            onsubmit="return confirm('¿Seguro que quieres eliminar tu cuenta? Esta acción no se puede deshacer.')">
        <button type="submit" class="btn btn-danger w-100 mt-2"> Eliminar cuenta</button>
      </form>

      <a href="{{ url_for('logout') }}" class="register-link" style="display:block; text-align:center; margin-top:12px;">
        Cerrar sesión
      </a>
    </div>
  </div>
</div>
</body>
</html>
