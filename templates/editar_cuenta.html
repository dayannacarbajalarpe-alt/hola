<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Editar Cuenta — Studio Moda</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div id="fondo">
  <a href="{{ url_for('mi_cuenta') }}" class="btn btn-warning position-absolute top-0 start-0 m-3">
    Volver
  </a>
  <div class="auth-wrap">
    <div class="auth-card">
      <h2 class="auth-title">Editar mis datos</h2>

      <form method="POST" action="{{ url_for('editar_cuenta') }}">
        <div class="field">
          <label>Nombre completo</label>
          <input type="text" name="nombre" value="{{ usuario.nombre }}" required/>
        </div>
        <div class="field">
          <label>Correo electrónico</label>
          <input type="email" name="correo" value="{{ usuario.correo }}" required/>
        </div>
        <div class="field">
          <label>Nueva contraseña <small>(déjalo vacío para no cambiarla)</small></label>
          <input type="password" name="contrasena" placeholder="••••••••"/>
        </div>
        <button type="submit" class="btn-primary"> Guardar cambios</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
