<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Panel Admin — Studio Moda</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <h2>Panel de Administrador</h2>
  <a href="{{ url_for('admin_agregar') }}" class="btn btn-success mb-3">➕ Agregar producto</a>
  <a href="{{ url_for('admin_dashboard') }}" class="btn btn-info mb-3">📊 Ver Dashboard</a>
  <a href="{{ url_for('inicio') }}" class="btn btn-secondary mb-3">← Volver a la tienda</a>

  <table class="table table-bordered">
    <thead>
      <tr>
        <th>ID</th><th>Nombre</th><th>Categoría</th><th>Precio</th><th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      {% for p in productos %}
      <tr>
        <td>{{ p.id }}</td>
        <td>{{ p.nombre }}</td>
        <td>{{ p.categoria }}</td>
        <td>S/ {{ "%.2f"|format(p.precio) }}</td>
        <td>
          <a href="{{ url_for('admin_editar', id=p.id) }}" class="btn btn-warning btn-sm">✏️ Editar</a>
          <form method="POST" action="{{ url_for('admin_borrar', id=p.id) }}" style="display:inline"
                onsubmit="return confirm('¿Borrar este producto?')">
            <button type="submit" class="btn btn-danger btn-sm">🗑️ Borrar</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
