<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perfil — Studio Moda</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div id="fondo">
  <a href="{{ url_for('inicio') }}" class="btn btn-warning position-absolute top-0 start-0 m-3">
  Volver al inicio
</a>
  <div class="auth-wrap">
    <div class="auth-card">

      <div class="auth-avatar">&#128100;</div>
      <h2 class="auth-title">Bienvenido de vuelta</h2>
      <p class="auth-sub">Ingresa tus datos para continuar</p>

      <form method="POST" action="{{ url_for('login') }}">
        <div class="field">
          <label>Correo electrónico</label>
          <input type="email" name="correo" placeholder="tucorreo@email.com" required/>
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" name="contrasena" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-primary">Iniciar sesión</button>
      </form>

      <p class="register-link">¿No tienes cuenta?
        <a href="{{ url_for('registro') }}">Regístrate aquí</a>
      </p>

    </div>
  </div>
</div>
</body>
</html>
