<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>studio moda — Tienda de Ropa</title>
   <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  
  <header class="header">
    <div class="header-inner">

     
      <div class="logo">Studio moda</div>


      <nav class="nav">
        <a href="#" class="nav-link">Inicio</a>
        <a href="#tienda" class="nav-link">Ver Tienda</a>
      </nav>

      
      <div class="search-bar">
        <input type="text" class="search-input" placeholder="Buscar prendas..." />
        <button class="search-btn">Buscar</button>
      </div>

    </div>
  </header>


  <section class="hero-banner">
    <div class="hero-placeholder">
      <img src="imagen/ropa.jpg" alt="ropa" width="1000px;">
    </div>
  </section>


  <section class="products" id="tienda">
    <h2 class="section-title">Colección</h2>

    <div class="cards-grid">

   
      <div class="card">
        <div class="card-image">
          <div class="img-placeholder"></div>
        </div>
        <div class="card-body">
          <p class="card-category">Pantalones</p>
          <h3 class="card-name">Jeans Clásico</h3>
          <p class="card-price">S/ 129.90</p>
          <button class="card-btn">Agregar al carrito</button>
        </div>
      </div>


      <div class="card">
        <div class="card-image">
          <div class="img-placeholder"></div>
        </div>
        <div class="card-body">
          <p class="card-category">Calzado</p>
          <h3 class="card-name">Zapatos Nike</h3>
          <p class="card-price">S/ 180.00</p>
          <button class="card-btn">Agregar al carrito</button>
        </div>
      </div>


      <div class="card">
        <div class="card-image">
          <div class="img-placeholder"></div>
        </div>
        <div class="card-body">
          <p class="card-category">Tops</p>
          <h3 class="card-name">Blusa Casual</h3>
          <p class="card-price">S/ 79.90</p>
          <button class="card-btn">Agregar al carrito</button>
        </div>
      </div>

    </div>
  </section>


  <footer class="footer">
    <p> 2026 fashion moda :Todos los derechos reservados</p>
  </footer>

</body>
</html>
