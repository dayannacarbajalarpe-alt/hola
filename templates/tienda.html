<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet.css') }}">
</head>
<body>
    <header class="header">
    <div class="header-inner">


      <div class="logo">Studio moda</div>


      <nav class="nav">
        <a href="{{ url_for('inicio') }}" class="nav-link">Inicio</a>
        <a href="{{ url_for('tienda') }}" class="nav-link">Ver Tienda</a>
        {% if session.es_admin %}
        <a href="{{ url_for('admin') }}" class="nav-link" style="color: gold; font-weight: bold;"> Panel Admin
        </a>
        {% endif %}
      </nav>


      <div class="search-bar">
        <input type="text" class="search-input" placeholder="Buscar prendas..." />
        <button class="search-btn">Buscar</button>
      </div>

      <div class="nav-actions">
  {% if session.usuario %}
    <a href="{{ url_for('mi_cuenta') }}" class="btn-icon" title="Mi perfil">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4" />
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
      </svg>
      <span>{{ session.usuario }}</span>
    </a>
    <a href="{{ url_for('logout') }}" class="btn-icon" title="Cerrar sesión">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </a>
  {% else %}
    <a href="{{ url_for('perfil') }}" class="btn-icon" title="Perfil">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4" />
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
      </svg>
    </a>
  {% endif %}

  <a href="{{ url_for('carrito') }}" class="btn-icon" title="Carrito">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
      <line x1="3" y1="6" x2="21" y2="6" />
      <path d="M16 10a4 4 0 0 1-8 0" />
    </svg>
  </a>
</div>

    </div>
  </header>
    <div class="tienda">
  <aside class="filtros">
    <h3>Categorías</h3>
    <label><input type="checkbox" name="categoria" value="jeans"> Jeans</label>
    <label><input type="checkbox" name="categoria" value="zapatos"> Zapatos</label>
    <label><input type="checkbox" name="categoria" value="polos"> Polos</label>
    <label><input type="checkbox" name="categoria" value="casacas"> Casacas</label>

    <h3>Ordenar por precio</h3>
    <select id="orden">
      <option value="default">Relevancia</option>
      <option value="asc">Menor a mayor</option>
      <option value="desc">Mayor a menor</option>
    </select>
  </aside>

  <main class="productos" id="grid">
    <!--productoss de la tienda.js-->
  </main>
</div>
<footer class="footer">
    <p> 2026 fashion moda :Todos los derechos reservados</p>
  </footer>
  <script>
  const productosDB = {{ productos_json | safe }};
</script>
<script src="{{ url_for('static', filename='tienda.js') }}"></script>
</body>
</html>
