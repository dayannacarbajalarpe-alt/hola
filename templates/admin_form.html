<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>{{ 'Editar' if producto else 'Agregar' }} Producto</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <h2>{{ 'Editar' if producto else 'Agregar' }} Producto</h2>

  <form method="POST" enctype="multipart/form-data" style="max-width:400px">
  <div class="mb-3">
    <label>Nombre</label>
    <input type="text" name="nombre" class="form-control"
           value="{{ producto.nombre if producto else '' }}" required/>
  </div>
  <div class="mb-3">
    <label>Categoría</label>
    <select name="categoria" class="form-control">
      {% for cat in ['jeans','zapatos','polos','casacas'] %}
      <option value="{{ cat }}" {{ 'selected' if producto and producto.categoria == cat }}>
        {{ cat }}
      </option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label>Precio (S/)</label>
    <input type="number" name="precio" step="0.01" class="form-control"
           value="{{ producto.precio if producto else '' }}" required/>
  </div>
  <div class="mb-3">
    <label>Imagen</label>
    <input type="file" name="imagen" class="form-control" accept="image/*"/>
    {% if producto and producto.imagen %}
    <img src="{{ url_for('static', filename='img/' + producto.imagen) }}" width="100" class="mt-2"/>
    {% endif %}
  </div>
  <button type="submit" class="btn btn-primary">
    {{ 'Guardar cambios' if producto else 'Agregar producto' }}
  </button>
  <a href="{{ url_for('admin') }}" class="btn btn-secondary">Cancelar</a>
</form>
</body>
</html>
