<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Dashboard — Studio Moda</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet.css') }}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    body { background:#0f1115; color:#eee; font-family: 'DM Sans', sans-serif; padding: 30px; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px; }
    .top-bar a { color:#19c37d; text-decoration:none; font-weight:600; }
    .cards { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
    .stat-card { background:#1a1d24; border-radius:12px; padding:18px; }
    .stat-card .label { color:#888; font-size:13px; margin-bottom:6px; }
    .stat-card .value { font-size:28px; font-weight:600; }
    .charts { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .chart-card { background:#1a1d24; border-radius:12px; padding:18px; }
    .chart-card h3 { margin-top:0; font-size:15px; color:#ccc; }
  </style>
</head>
<body>

  <div class="top-bar">
    <h2>Dashboard — Studio Moda</h2>
    <a href="{{ url_for('admin') }}">← Volver al panel de productos</a>
  </div>

  <div class="cards">
    <div class="stat-card">
      <div class="label">Productos</div>
      <div class="value">{{ datos.total_productos }}</div>
    </div>
    <div class="stat-card">
      <div class="label">Usuarios registrados</div>
      <div class="value">{{ datos.total_usuarios }}</div>
    </div>
    <div class="stat-card">
      <div class="label">Pedidos realizados</div>
      <div class="value">{{ datos.total_pedidos }}</div>
    </div>
    <div class="stat-card">
      <div class="label">Ingresos totales</div>
      <div class="value">S/ {{ datos.ingresos_totales }}</div>
    </div>
  </div>

  <div class="charts">
    <div class="chart-card">
      <h3>Ventas por categoría</h3>
      <canvas id="graficoCategorias"></canvas>
    </div>
    <div class="chart-card">
      <h3>Productos más vendidos</h3>
      <canvas id="graficoTop"></canvas>
    </div>
  </div>

  <script>
    const categorias = {{ datos.categorias | tojson }};
    const ventasCategoria = {{ datos.ventas_por_categoria | tojson }};
    const productosTop = {{ datos.productos_top | tojson }};
    const cantidadesTop = {{ datos.cantidades_top | tojson }};

    new Chart(document.getElementById('graficoCategorias'), {
      type: 'doughnut',
      data: {
        labels: categorias.length ? categorias : ['Sin datos'],
        datasets: [{
          data: ventasCategoria.length ? ventasCategoria : [1],
          backgroundColor: ['#19c37d', '#3b82f6', '#f59e0b', '#ef4444', '#a855f7']
        }]
      },
      options: { plugins: { legend: { labels: { color: '#ccc' } } } }
    });

    new Chart(document.getElementById('graficoTop'), {
      type: 'bar',
      data: {
        labels: productosTop.length ? productosTop : ['Sin datos'],
        datasets: [{
          label: 'Unidades vendidas',
          data: cantidadesTop.length ? cantidadesTop : [0],
          backgroundColor: '#19c37d'
        }]
      },
      options: {
        scales: {
          x: { ticks: { color: '#ccc' } },
          y: { ticks: { color: '#ccc' } }
        },
        plugins: { legend: { display: false } }
      }
    });
  </script>

</body>
</html>
